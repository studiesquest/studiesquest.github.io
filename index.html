<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudiesQuest</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div id="home-btn" title="Go Home">&#8962;</div>
  <h1>StudiesQuest</h1>
  <input type="text" id="search-bar" placeholder="Search games...">
</header>

<div id="filters">
  <button data-filter="all" class="filter-btn active">All</button>
  <button data-filter="Playable" class="filter-btn">Playable</button>
  <button data-filter="Slightly Unplayable" class="filter-btn">Slightly Unplayable</button>
  <button data-filter="Hardly Playable" class="filter-btn">Hardly Playable</button>
</div>

<main>
  <div id="game-grid"></div>
  <div id="game-container" class="hidden">
    <iframe id="game-frame" src="" frameborder="0" allowfullscreen></iframe>
  </div>
</main>

<script src="game.js"></script>
<script src="main.js"></script>
</body>
</html>
