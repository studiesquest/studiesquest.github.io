<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudiesQuest Arcade</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>StudiesQuest Arcade</h1>
    <input type="text" id="searchInput" placeholder="Search games...">
    <div id="filterButtons">
        <button class="filter-btn all">All</button>
        <button class="filter-btn playable">Playable</button>
        <button class="filter-btn slightly">Slightly Unplayable</button>
        <button class="filter-btn hardly">Hardly Playable</button>
    </div>
</header>

<div id="gridContainer" class="grid-container"></div>

<div id="modal" class="modal">
    <button id="homeBtn">🏠 Home</button>
    <iframe id="gameFrame" src="" frameborder="0" allowfullscreen></iframe>
</div>

<script src="games.js"></script>
<script src="main.js"></script>
</body>
</html>
