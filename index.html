<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudiesQuest</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;

background-color:#020617;
background-image:
linear-gradient(rgba(0,255,200,0.07) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,200,0.07) 1px, transparent 1px);
background-size:40px 40px;
}

header{
font-size:38px;
padding:25px;
font-weight:bold;
letter-spacing:3px;
border-bottom:2px solid #00ffd5;
box-shadow:0 0 20px #00ffd5;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:30px;
padding:40px;
}

.game{
background:#0f172a;
border-radius:12px;
padding:10px;
border:1px solid #00ffd5;
box-shadow:0 0 15px rgba(0,255,200,0.4);
transition:.25s;
}

.game:hover{
transform:scale(1.03);
box-shadow:0 0 25px #00ffd5;
}

iframe{
width:100%;
height:500px;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<header>⚔️ StudiesQuest</header>

<div class="games" id="games"></div>
