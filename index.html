<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudiesQuest</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>StudiesQuest Games</h1>
    <input type="text" id="search" placeholder="Search games...">
    <div id="filters">
        <button class="filter-btn" data-filter="All">All</button>
        <button class="filter-btn playable" data-filter="Playable">Playable</button>
        <button class="filter-btn slightly" data-filter="Slightly Unplayable">Slightly Unplayable</button>
        <button class="filter-btn hardly" data-filter="Hardly Playable">Hardly Playable</button>
    </div>
</header>

<main id="games" class="grid-container"></main>

<!-- Modal for fullscreen game -->
<div id="modal" class="modal">
    <button id="homeBtn">🏠 Home</button>
    <iframe id="gameFrame" src="" frameborder="0"></iframe>
</div>

<script src="games.js"></script>
<script>
const searchInput = document.getElementById("search");
searchInput.addEventListener("input", () => {
    const query = searchInput.value.toLowerCase();
    document.querySelectorAll(".game-tile").forEach(game => {
        const title = game.dataset.title.toLowerCase();
        game.style.display = title.includes(query) ? "block" : "none";
    });
});

// Filter functionality
document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        const filter = btn.dataset.filter;
        document.querySelectorAll(".game-tile").forEach(game => {
            if(filter === "All" || game.dataset.signin === filter || game.dataset.normal === filter) {
                game.style.display = "block";
            } else {
                game.style.display = "none";
            }
        });
    });
});

// Modal open/close
const modal = document.getElementById("modal");
const gameFrame = document.getElementById("gameFrame");
const homeBtn = document.getElementById("homeBtn");

document.addEventListener("click", e => {
    if(e.target.classList.contains("game-tile-img")) {
        const src = e.target.dataset.src;
        gameFrame.src = src;
        modal.style.display = "flex";
    }
});

homeBtn.addEventListener("click", () => {
    modal.style.display = "none";
    gameFrame.src = "";
});
</script>

</body>
</html>
