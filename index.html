<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudiesQuest Games</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="home-screen">
  <h1>StudiesQuest Games</h1>

  <!-- Search bar -->
  <input type="text" id="search-bar" placeholder="Search games...">

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn" data-filter="all">All</button>
    <button class="filter-btn" data-filter="Playable">Playable</button>
    <button class="filter-btn" data-filter="Slightly Unplayable">Slightly Unplayable</button>
    <button class="filter-btn" data-filter="Hardly Playable">Hardly Playable</button>
  </div>

  <!-- Game grid -->
  <div id="game-grid"></div>
</div>

<!-- Fullscreen iframe -->
<div id="game-view" class="hidden">
  <button id="home-btn">🏠 Home</button>
  <iframe id="game-iframe" src="" frameborder="0" allowfullscreen></iframe>
</div>

<script src="game.js"></script>
<script src="main.js"></script>
</body>
</html>
