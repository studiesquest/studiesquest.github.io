<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudiesQuest</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <button id="homeBtn" title="Go Home">🏠</button>
  <input type="text" id="searchBar" placeholder="Search games...">
  <div id="filters">
    <button class="filterBtn" data-filter="all">All</button>
    <button class="filterBtn" data-filter="Playable">Playable</button>
    <button class="filterBtn" data-filter="Slightly Unplayable">Slightly Unplayable</button>
    <button class="filterBtn" data-filter="Hardly Playable">Hardly Playable</button>
  </div>
</header>

<main>
  <div id="gridContainer"></div>
</main>

<div id="modal">
  <iframe id="gameFrame" frameborder="0"></iframe>
</div>

<script src="games.js"></script>
<script src="main.js"></script>
</body>
</html>
